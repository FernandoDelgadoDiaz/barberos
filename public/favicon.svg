<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Dark Luxury Scissors Favicon -->

  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="#080808" stroke="#B8FF47" stroke-width="2"/>

  <!-- Crossed scissors -->
  <g transform="translate(24, 24) rotate(45)">
    <!-- Left blade -->
    <path d="M-10,-8 L2,8 L-2,12 L-14,-4 Z" fill="#B8FF47"/>
    <!-- Right blade -->
    <path d="M10,-8 L-2,8 L2,12 L14,-4 Z" fill="#B8FF47"/>
    <!-- Handles -->
    <path d="M-14,-4 L-18,4 Q-20,8 -18,12 L-8,2" stroke="#B8FF47" stroke-width="2" fill="none"/>
    <path d="M14,-4 L18,4 Q20,8 18,12 L8,2" stroke="#B8FF47" stroke-width="2" fill="none"/>
    <!-- Pivot -->
    <circle cx="0" cy="0" r="3" fill="#080808" stroke="#B8FF47" stroke-width="1"/>
    <circle cx="0" cy="0" r="1" fill="#B8FF47"/>
  </g>

  <!-- Accent ring -->
  <circle cx="24" cy="24" r="20" stroke="#111111" stroke-width="1" fill="none"/>
</svg>